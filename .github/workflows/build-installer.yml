name: Build Windows Installer

# Builds the MSIX package AND a double-click Setup.exe installer on a
# Microsoft-hosted Windows runner, then uploads them as downloadable artifacts.
#
# HOW TO GET YOUR INSTALLER:
#   1. Push this repository to GitHub.
#   2. Go to the "Actions" tab -> "Build Windows Installer" -> "Run workflow".
#      (It also runs automatically on every push to main/master, and on tags.)
#   3. When it finishes (~5 min), open the run and download the
#      "NotificationReader-Setup" artifact. Inside is NotificationReader_Setup.exe.
#   4. Pushing a tag like  v1.0.0  also creates a GitHub Release with the
#      installer attached for easy sharing.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:      # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create self-signed signing certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=NotificationReader" `
            -KeyUsage DigitalSignature `
            -FriendlyName "NotificationReader" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Export-Certificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\NotificationReader.cer" | Out-Null
          $pwd = ConvertTo-SecureString -String "NotificationReader!1" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\NotificationReader.pfx" -Password $pwd | Out-Null

      - name: Restore packaging project
        run: msbuild packaging\NotificationReader.Package.wapproj /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Build MSIX package
        run: >
          msbuild packaging\NotificationReader.Package.wapproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundle=Never
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageSigningEnabled=true
          /p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT
          /p:GenerateAppInstallerFile=false

      - name: Compile Setup.exe with Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer.iss"

      - name: Upload Setup.exe installer
        uses: actions/upload-artifact@v4
        with:
          name: NotificationReader-Setup
          path: installer_output/NotificationReader_Setup.exe
          if-no-files-found: error

      - name: Upload raw MSIX + certificate (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: NotificationReader-MSIX
          path: |
            packaging/AppPackages/**/*.msix
            NotificationReader.cer

      - name: Attach installer to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/NotificationReader_Setup.exe
            NotificationReader.cer
