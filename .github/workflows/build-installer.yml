name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        
      - name: Install Windows 11 SDK (10.0.22621) for MSIX packaging
        run: choco install windows-sdk-11-version-22H2-all --no-progress -y
        
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create self-signed signing certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=NotificationReader" `
            -KeyUsage DigitalSignature `
            -FriendlyName "NotificationReader" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Export-Certificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\NotificationReader.cer" | Out-Null
          $pwd = ConvertTo-SecureString -String "NotificationReader!1" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\NotificationReader.pfx" -Password $pwd | Out-Null

      - name: Restore packaging project
        run: msbuild packaging\NotificationReader.Package.wapproj /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Build MSIX package
        run: >
          msbuild packaging\NotificationReader.Package.wapproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundle=Never
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageSigningEnabled=true
          /p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT
          /p:GenerateAppInstallerFile=false

      - name: Stage MSIX for installer
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Path . -Filter *.msix -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -notmatch '\\Dependencies\\' } |
                  Select-Object -First 1
          if (-not $msix) {
            Write-Host "No .msix found. Listing all packaging output for diagnosis:"
            Get-ChildItem -Path packaging -Recurse -Include *.msix,*.msixbundle,*.appx -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host $_.FullName }
            Write-Error "Build did not produce an .msix package."
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $msix.FullName (Join-Path dist $msix.Name) -Force
          Write-Host "Staged MSIX: $($msix.FullName)"

      - name: Compile Setup.exe with Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer.iss"

      - name: Upload Setup.exe installer
        uses: actions/upload-artifact@v4
        with:
          name: NotificationReader-Setup
          path: installer_output/NotificationReader_Setup.exe
          if-no-files-found: error

      - name: Upload raw MSIX + certificate (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: NotificationReader-MSIX
          path: |
            packaging/AppPackages/**/*.msix
            NotificationReader.cer
